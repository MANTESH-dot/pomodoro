<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ffffff" id="themeColor">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Pomodoro Focus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;touch-action:manipulation}
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#eeecea;--txt:#1a1a1a;--txt2:#666;--txt3:#bbb;--brd:rgba(0,0,0,0.1);--brd2:rgba(0,0,0,0.2);--sh:rgba(0,0,0,0.06)}
.dark{--bg:#111;--bg2:#1c1c1c;--bg3:#252525;--txt:#f0f0f0;--txt2:#888;--txt3:#444;--brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.18);--sh:rgba(0,0,0,0.3)}

.shell{background:var(--bg);color:var(--txt);height:100dvh;display:flex;flex-direction:column;transition:background .3s,color .3s;overflow:hidden}

/* ── Top bar ── */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 10px;flex-shrink:0}
.app-title{font-size:15px;font-weight:700;color:var(--txt);letter-spacing:-.3px}
.top-actions{display:flex;gap:8px}
.icon-btn{background:var(--bg2);border:none;border-radius:10px;padding:8px 13px;cursor:pointer;color:var(--txt2);font-size:13px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:5px}
.icon-btn:active{transform:scale(.95);opacity:.8}
.icon-btn.on{background:var(--txt);color:var(--bg)}

/* ── Mode tabs ── */
.modes{display:flex;gap:0;margin:0 16px;background:var(--bg2);border-radius:12px;padding:3px;flex-shrink:0}
.mode-btn{flex:1;font-size:12.5px;padding:8px 4px;border-radius:9px;border:none;background:transparent;color:var(--txt2);cursor:pointer;transition:all .2s;font-weight:500;white-space:nowrap}
.mode-btn:active{transform:scale(.97)}
.mode-btn.active{background:var(--bg);color:var(--txt);box-shadow:0 1px 4px var(--sh)}

/* ── Timer ring ── */
.ring-section{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;min-height:0}
.ring-wrap{position:relative;width:min(55vw,240px);height:min(55vw,240px)}
svg.ring{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:10}
.ring-prog{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .5s linear,stroke .4s}
.time-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:100%}
.big{font-size:clamp(36px,10vw,52px);font-weight:300;line-height:1;letter-spacing:-2px;color:var(--txt)}
.tlbl{font-size:12px;color:var(--txt2);margin-top:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}

/* ── Session dots ── */
.sessions{display:flex;gap:8px;align-items:center;margin-top:18px}
.dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--txt3);background:transparent;transition:all .3s}
.dot.done{background:var(--txt);border-color:var(--txt)}
.dot.current{background:var(--txt2);border-color:var(--txt2)}
.slbl{font-size:12px;color:var(--txt2);margin-left:6px}

/* ── Controls ── */
.controls{display:flex;gap:12px;align-items:center;justify-content:center;padding:16px 20px;flex-shrink:0}
.ctrl-btn{padding:14px 28px;border-radius:14px;border:none;background:var(--bg2);color:var(--txt);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;min-width:80px}
.ctrl-btn:active{transform:scale(.95);opacity:.8}
.ctrl-btn.primary{background:var(--txt);color:var(--bg);min-width:120px;font-size:17px;border-radius:16px}
.ctrl-btn.sm{font-size:13px;padding:12px 18px;color:var(--txt2);min-width:60px}

/* ── Sound sheet ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .25s;z-index:10;backdrop-filter:blur(2px)}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-radius:22px 22px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);transform:translateY(100%);transition:transform .32s cubic-bezier(.32,0,.18,1);z-index:11;max-height:82dvh;display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--brd2);border-radius:2px;margin:12px auto 0}
.sheet-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 10px;flex-shrink:0}
.sheet-title{font-size:16px;font-weight:700;color:var(--txt)}
.sync-btn{font-size:12px;padding:6px 12px;border-radius:8px;border:1.5px solid var(--brd2);background:transparent;color:var(--txt2);cursor:pointer;font-weight:600}
.sync-btn.on{background:var(--txt);color:var(--bg);border-color:transparent}

/* Cat tabs */
.cat-tabs{display:flex;gap:0;margin:0 16px 10px;background:var(--bg2);border-radius:10px;padding:3px;flex-shrink:0}
.cat-tab{flex:1;font-size:12.5px;padding:8px 4px;border-radius:7px;border:none;background:transparent;color:var(--txt2);cursor:pointer;font-weight:500;transition:all .18s}
.cat-tab:active{opacity:.7}
.cat-tab.active{background:var(--bg);color:var(--txt);box-shadow:0 1px 4px var(--sh)}

/* Combos */
.combos{display:flex;gap:7px;padding:0 16px 10px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.combos::-webkit-scrollbar{display:none}
.combo-badge{font-size:12px;padding:7px 13px;border-radius:20px;border:1.5px solid var(--brd);background:var(--bg2);color:var(--txt2);cursor:pointer;white-space:nowrap;font-weight:500;flex-shrink:0}
.combo-badge:active{transform:scale(.95)}

/* Layers */
.layers{overflow-y:auto;padding:0 16px;flex:1;-webkit-overflow-scrolling:touch}
.layers::-webkit-scrollbar{display:none}
.layer{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;background:var(--bg2);margin-bottom:8px;cursor:pointer;transition:all .18s;border:1.5px solid transparent}
.layer:active{transform:scale(.98)}
.layer.active{background:var(--bg3);border-color:var(--brd2)}
.layer-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.layer-info{flex:1;min-width:0}
.layer-name{font-size:13.5px;font-weight:600;color:var(--txt)}
.layer-desc{font-size:11px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vol-col{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
input[type=range]{width:70px;accent-color:var(--txt);cursor:pointer;height:20px}
.vol-num{font-size:10px;color:var(--txt3);text-align:right}
.play-pill{font-size:11px;padding:4px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--brd2);color:var(--txt2);font-weight:600;flex-shrink:0}
.layer.active .play-pill{background:var(--txt);color:var(--bg);border-color:transparent}

/* Master vol */
.master-row{display:flex;align-items:center;gap:10px;padding:12px 20px 6px;border-top:1px solid var(--brd);flex-shrink:0}
.master-label{font-size:12px;color:var(--txt2);min-width:72px;font-weight:500}
input.wide{flex:1;accent-color:var(--txt)}
</style>
</head>
<body>
<div class="shell" id="shell">

  <!-- Top bar -->
  <div class="topbar">
    <span class="app-title">🍅 Pomodoro</span>
    <div class="top-actions">
      <button class="icon-btn" id="soundToggle" onclick="toggleSheet()">♪ Sounds</button>
      <button class="icon-btn" id="darkToggle" onclick="toggleDark()">◑</button>
    </div>
  </div>

  <!-- Mode tabs -->
  <div class="modes">
    <button class="mode-btn active" data-mode="focus" onclick="setMode('focus')">Focus</button>
    <button class="mode-btn" data-mode="short" onclick="setMode('short')">Short Break</button>
    <button class="mode-btn" data-mode="long" onclick="setMode('long')">Long Break</button>
  </div>

  <!-- Timer -->
  <div class="ring-section">
    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="100"/>
        <circle class="ring-prog" id="ringProg" cx="110" cy="110" r="100"/>
      </svg>
      <div class="time-display">
        <div class="big" id="timeDisplay">25:00</div>
        <div class="tlbl" id="modeLabel">Focus</div>
      </div>
    </div>
    <div class="sessions">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
      <span class="slbl" id="sessionLabel">Session 1 of 4</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn sm" onclick="resetTimer()">Reset</button>
    <button class="ctrl-btn primary" id="startBtn" onclick="toggleTimer()">Start</button>
    <button class="ctrl-btn sm" onclick="skipSession()">Skip</button>
  </div>

</div>

<!-- Sound sheet overlay -->
<div class="sheet-overlay" id="overlay" onclick="toggleSheet()"></div>

<!-- Bottom sheet -->
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Ambient Sounds</span>
    <button class="sync-btn" id="syncBtn" onclick="toggleSync()">⇄ Sync All</button>
  </div>
  <div class="cat-tabs">
    <button class="cat-tab active" onclick="setCat('focus',this)">🧠 Deep Focus</button>
    <button class="cat-tab" onclick="setCat('nature',this)">🌿 Natural Flow</button>
  </div>
  <div class="combos" id="comboBar"></div>
  <div class="layers" id="layerList"></div>
  <div class="master-row">
    <span class="master-label">Master vol.</span>
    <input type="range" class="wide" min="0" max="1" step="0.01" value="0.7" oninput="setMaster(this.value)">
  </div>
</div>

<script>
// ── Timer ──────────────────────────────────────────
const MODES={focus:{s:25*60,label:'Focus',color:'#5B5BE6'},short:{s:5*60,label:'Short Break',color:'#1D9E75'},long:{s:15*60,label:'Long Break',color:'#BA7517'}};
const C=2*Math.PI*100;
let timerMode='focus',total=MODES.focus.s,left=total,running=false,tick=null,session=0,dark=false,sheetOpen=false;
const ring=document.getElementById('ringProg');
ring.style.strokeDasharray=C;ring.style.strokeDashoffset=0;ring.style.stroke=MODES.focus.color;
function fmt(s){let m=Math.floor(s/60),ss=s%60;return(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;}
function draw(){ring.style.strokeDashoffset=C*(1-left/total);document.getElementById('timeDisplay').textContent=fmt(left);}
function dots(){for(let i=0;i<4;i++){let d=document.getElementById('d'+i);d.className='dot'+(i<session?' done':i===session&&timerMode==='focus'?' current':'');}}
function updSL(){document.getElementById('sessionLabel').textContent='Session '+(session+1)+' of 4';}
function setMode(m){timerMode=m;running=false;clearInterval(tick);document.getElementById('startBtn').textContent='Start';document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));total=MODES[m].s;left=total;ring.style.stroke=MODES[m].color;document.getElementById('modeLabel').textContent=MODES[m].label;draw();}
function toggleTimer(){let b=document.getElementById('startBtn');if(!running){running=true;b.textContent='Pause';tick=setInterval(()=>{if(left<=0){clearInterval(tick);running=false;b.textContent='Start';beep();autoNext();return;}left--;draw();},1000);}else{running=false;clearInterval(tick);b.textContent='Start';}}
function resetTimer(){running=false;clearInterval(tick);document.getElementById('startBtn').textContent='Start';left=total;draw();}
function skipSession(){running=false;clearInterval(tick);document.getElementById('startBtn').textContent='Start';left=0;autoNext();}
function autoNext(){if(timerMode==='focus'){session=(session+1)%4;dots();updSL();setMode(session===0?'long':'short');}else setMode('focus');}
function toggleDark(){dark=!dark;document.getElementById('shell').classList.toggle('dark',dark);document.getElementById('darkToggle').classList.toggle('on',dark);document.getElementById('themeColor').content=dark?'#111':'#ffffff';}
function toggleSheet(){sheetOpen=!sheetOpen;document.getElementById('sheet').classList.toggle('open',sheetOpen);document.getElementById('overlay').classList.toggle('open',sheetOpen);document.getElementById('soundToggle').classList.toggle('on',sheetOpen);}
function beep(){try{let c=new(window.AudioContext||window.webkitAudioContext)();[0,300,600].forEach(d=>{let o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=660;g.gain.setValueAtTime(0.2,c.currentTime+d/1000);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d/1000+0.25);o.start(c.currentTime+d/1000);o.stop(c.currentTime+d/1000+0.3);});}catch(e){}}
draw();dots();updSL();

// ── Audio engine ───────────────────────────────────
let AC=null,masterNode=null,masterVol=0.7;
function getAC(){if(!AC||AC.state==='closed')AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function getMaster(){const ac=getAC();if(!masterNode||masterNode.context!==ac){masterNode=ac.createGain();masterNode.gain.value=masterVol;masterNode.connect(ac.destination);}return masterNode;}
function setMaster(v){masterVol=parseFloat(v);if(masterNode)masterNode.gain.value=masterVol;}
function noiseBuf(ac,sec,type){const buf=ac.createBuffer(1,ac.sampleRate*sec,ac.sampleRate),d=buf.getChannelData(0);let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0,last=0;for(let i=0;i<d.length;i++){const w=Math.random()*2-1;if(type==='pink'){b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.969*b2+w*0.153852;b3=0.8665*b3+w*0.3104856;b4=0.55*b4+w*0.5329522;b5=-0.7616*b5-w*0.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;}else if(type==='brown'){last=(last+0.02*w)/1.02;d[i]=last*3.5;}else d[i]=w;}return buf;}
function loopNoise(ac,dest,sec,type,fType,freq,q,gain){const src=ac.createBufferSource();src.buffer=noiseBuf(ac,sec,type);src.loop=true;const f=ac.createBiquadFilter();f.type=fType;f.frequency.value=freq;if(q)f.Q.value=q;const g=ac.createGain();g.gain.value=gain;src.connect(f);f.connect(g);g.connect(dest);src.start();return[src,f,g];}
function lfo(ac,target,rate,depth){const o=ac.createOscillator(),g=ac.createGain();o.frequency.value=rate;g.gain.value=depth;o.connect(g);g.connect(target);o.start();return[o,g];}

// ── Sound makers ───────────────────────────────────
function mkBrownNoise(ac,d){return loopNoise(ac,d,6,'brown','lowpass',400,0.8,0.55);}
function mkRainWindow(ac,dest){const n=[...loopNoise(ac,dest,6,'white','bandpass',2500,0.5,0.3),...loopNoise(ac,dest,6,'pink','lowpass',800,0.6,0.18)];const ivs=[];function drip(){const o=ac.createOscillator(),g=ac.createGain();const f=700+Math.random()*500;o.type='sine';o.frequency.setValueAtTime(f,AC.currentTime);o.frequency.exponentialRampToValueAtTime(f*.5,AC.currentTime+.09);g.gain.setValueAtTime(.1,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.18);o.connect(g);g.connect(dest);o.start();o.stop(AC.currentTime+.2);n.push(o);}drip();ivs.push(setInterval(()=>drip(),600+Math.random()*1200));n._ivs=ivs;return n;}
function mkThunderstorm(ac,dest){const n=[...loopNoise(ac,dest,8,'white','highpass',600,.3,.28),...loopNoise(ac,dest,8,'brown','lowpass',200,.8,.22)];const ivs=[];function thunder(){const b=noiseBuf(ac,3,'brown');const src=ac.createBufferSource();src.buffer=b;const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=180;const g=ac.createGain();const t=ac.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.45,t+.08);g.gain.exponentialRampToValueAtTime(.001,t+2.8);src.connect(f);f.connect(g);g.connect(dest);src.start();src.stop(t+3);n.push(src);}thunder();ivs.push(setInterval(()=>{if(Math.random()>.4)thunder();},7000+Math.random()*8000));n._ivs=ivs;return n;}
function mkForestWind(ac,dest){const n=[];[.5,.9,.4].forEach((s,i)=>{const nodes=loopNoise(ac,dest,8,'pink','bandpass',700+i*350,.5,.22-i*.04);n.push(...nodes);const[lo,lg]=lfo(ac,nodes[1].frequency,.1+i*.06,180);n.push(lo,lg);});const deep=loopNoise(ac,dest,4,'brown','lowpass',100,.7,.14);n.push(...deep);return n;}
function mkFireplace(ac,dest){const n=[...loopNoise(ac,dest,6,'brown','lowpass',350,.9,.3),...loopNoise(ac,dest,6,'pink','bandpass',1200,.4,.12)];const ivs=[];function crackle(){const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='highpass';f.frequency.value=2000;o.type='sawtooth';o.frequency.value=80+Math.random()*60;const t=ac.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.08,t+.005);g.gain.exponentialRampToValueAtTime(.001,t+.04+Math.random()*.06);o.connect(f);f.connect(g);g.connect(dest);o.start();o.stop(t+.12);n.push(o);}crackle();ivs.push(setInterval(()=>crackle(),150+Math.random()*400));n._ivs=ivs;return n;}
function mkOceanWaves(ac,dest){const n=[];for(let i=0;i<3;i++){const nodes=loopNoise(ac,dest,10,'pink','lowpass',500,.6,.2);n.push(...nodes);const[lo,lg]=lfo(ac,nodes[2].gain,.07+i*.025,.15);n.push(lo,lg);}const deep=loopNoise(ac,dest,6,'brown','lowpass',90,.8,.18);n.push(...deep);return n;}
function mkCafe(ac,dest){const n=[...loopNoise(ac,dest,6,'pink','bandpass',1200,.35,.2),...loopNoise(ac,dest,6,'white','bandpass',2500,.3,.06)];const ivs=[];function clink(){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';const f=2100+Math.random()*900;o.frequency.setValueAtTime(f,ac.currentTime);o.frequency.exponentialRampToValueAtTime(f*.6,ac.currentTime+.3);g.gain.setValueAtTime(.09,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.4);o.connect(g);g.connect(dest);o.start();o.stop(ac.currentTime+.5);n.push(o);}clink();ivs.push(setInterval(()=>{if(Math.random()>.5)clink();},2500+Math.random()*4000));n._ivs=ivs;return n;}
function mkNightCrickets(ac,dest){const n=[...loopNoise(ac,dest,6,'pink','bandpass',3800,1.2,.06)];const ivs=[];function chirpBurst(delay,freq,count){for(let i=0;i<count;i++){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=freq+Math.random()*80;const t=ac.currentTime+delay+i*.045;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.13+Math.random()*.06,t+.01);g.gain.exponentialRampToValueAtTime(.001,t+.04);o.connect(g);g.connect(dest);o.start(t);o.stop(t+.05);n.push(o);}}const colonies=[{freq:3900,rate:380},{freq:4200,rate:420},{freq:3600,rate:350}];colonies.forEach((c,ci)=>{let t=ci*.12;for(let i=0;i<18;i++){chirpBurst(t,c.freq,3+Math.floor(Math.random()*3));t+=c.rate/1000+Math.random()*.08;}const iv=setInterval(()=>{if(!layerState['crickets']?.active){clearInterval(iv);return;}let t2=.05;for(let i=0;i<8;i++){chirpBurst(t2,c.freq,3+Math.floor(Math.random()*3));t2+=c.rate/1000+Math.random()*.1;}},3500+ci*400);ivs.push(iv);});n._ivs=ivs;return n;}
function mkBirds(ac,dest){const n=[...loopNoise(ac,dest,4,'pink','bandpass',1800,.3,.08)];const birds=[[2800,.18,0],[3200,.12,1],[2400,.22,2],[3500,.1,0],[2600,.15,1]];function chirp(delay,freq,dur,style){const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();f.type='bandpass';f.frequency.value=freq*1.4;f.Q.value=2;o.type='sine';const t=ac.currentTime+delay;if(style===0){o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(freq*1.4,t+dur*.5);o.frequency.exponentialRampToValueAtTime(freq*1.1,t+dur);}else if(style===1){o.frequency.setValueAtTime(freq*1.3,t);o.frequency.exponentialRampToValueAtTime(freq,t+dur);}else{o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(freq*1.6,t+dur*.3);o.frequency.exponentialRampToValueAtTime(freq*.9,t+dur*.7);}g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.16,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(f);f.connect(g);g.connect(dest);o.start(t);o.stop(t+dur+.05);n.push(o);}let ct=.2;for(let i=0;i<30;i++){const b=birds[Math.floor(Math.random()*birds.length)];chirp(ct,b[0],b[1],b[2]);ct+=.5+Math.random()*2.5;}const iv=setInterval(()=>{if(!layerState['birds']?.active){clearInterval(iv);return;}let ct2=.1;for(let i=0;i<10;i++){const b=birds[Math.floor(Math.random()*birds.length)];chirp(ct2,b[0],b[1],b[2]);ct2+=.5+Math.random()*3;}},8000);n._ivs=[iv];return n;}
function mkBambooWind(ac,dest){const n=[];[.3,.7,.5].forEach((g,i)=>{const nodes=loopNoise(ac,dest,8,'pink','bandpass',1400+i*600,.7,.15-i*.03);n.push(...nodes);const[lo,lg]=lfo(ac,nodes[1].frequency,.2+i*.1,300);n.push(lo,lg);});const ivs=[];function knock(){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(440+Math.random()*220,ac.currentTime);g.gain.setValueAtTime(.12,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.25);o.connect(g);g.connect(dest);o.start();o.stop(ac.currentTime+.3);n.push(o);}knock();ivs.push(setInterval(()=>{if(Math.random()>.6)knock();},1500+Math.random()*3500));n._ivs=ivs;return n;}
function mkJungle(ac,dest){const n=[...loopNoise(ac,dest,6,'pink','bandpass',900,.4,.22),...loopNoise(ac,dest,6,'pink','bandpass',2200,.5,.1)];const birds=[[3200,.1,1],[2600,.14,2],[4000,.08,0]];const ivs=[];function jbird(delay,freq,dur,s){const o=ac.createOscillator(),g=ac.createGain();o.type='sine';const t=ac.currentTime+delay;o.frequency.setValueAtTime(freq,t);if(s===0)o.frequency.exponentialRampToValueAtTime(freq*1.5,t+dur);else if(s===1)o.frequency.setValueAtTime(freq,t);else{o.frequency.exponentialRampToValueAtTime(freq*1.7,t+dur*.4);o.frequency.exponentialRampToValueAtTime(freq,t+dur);}g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.13,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.connect(g);g.connect(dest);o.start(t);o.stop(t+dur+.05);n.push(o);}let ct=.3;for(let i=0;i<20;i++){const b=birds[Math.floor(Math.random()*birds.length)];jbird(ct,b[0],b[1],b[2]);ct+=.3+Math.random()*2;}ivs.push(setInterval(()=>{if(!layerState['jungle']?.active){clearInterval(iv);return;}let ct2=.1;for(let i=0;i<8;i++){const b=birds[Math.floor(Math.random()*birds.length)];jbird(ct2,b[0],b[1],b[2]);ct2+=.4+Math.random()*1.8;}},6000));n._ivs=ivs;return n;}
function mkRiver(ac,dest){const n=[...loopNoise(ac,dest,8,'white','bandpass',1800,.4,.22),...loopNoise(ac,dest,8,'pink','lowpass',600,.6,.18)];[0,1,2].forEach(i=>{const nodes=loopNoise(ac,dest,5,'pink','bandpass',800+i*300,.5,.1);n.push(...nodes);const[lo,lg]=lfo(ac,nodes[2].gain,.3+i*.15,.07);n.push(lo,lg);});return n;}
function mkMountainWind(ac,dest){const n=[];[.2,.6,1].forEach((spd,i)=>{const nodes=loopNoise(ac,dest,10,'pink','bandpass',300+i*250,.3,.2-i*.05);n.push(...nodes);const[lo,lg]=lfo(ac,nodes[1].frequency,.05+i*.04,120);n.push(lo,lg);const[lo2,lg2]=lfo(ac,nodes[2].gain,.08+i*.03,.08);n.push(lo2,lg2);});n.push(...loopNoise(ac,dest,6,'brown','lowpass',80,.8,.12));return n;}

// ── Layer defs ─────────────────────────────────────
const FOCUS_LAYERS=[
  {id:'brown',icon:'🤎',name:'Brown Noise',desc:'Deep focus, less harsh than white noise',vol:.55,cat:'focus',make:mkBrownNoise},
  {id:'rain',icon:'🌧',name:'Rain on Window',desc:'Gentle steady rainfall on glass',vol:.5,cat:'focus',make:mkRainWindow},
  {id:'thunder',icon:'⛈',name:'Distant Thunderstorm',desc:'Soft rolling thunder & rain',vol:.45,cat:'focus',make:mkThunderstorm},
  {id:'forestwind',icon:'🌲',name:'Forest + Wind',desc:'Rustling trees & layered breeze',vol:.5,cat:'focus',make:mkForestWind},
  {id:'fire',icon:'🔥',name:'Fireplace',desc:'Crackling warm fire',vol:.48,cat:'focus',make:mkFireplace},
  {id:'ocean',icon:'🌊',name:'Ocean Waves',desc:'Slow, repetitive rolling waves',vol:.5,cat:'focus',make:mkOceanWaves},
  {id:'cafe',icon:'☕',name:'Café Ambience',desc:'Low chatter & cup clinking',vol:.42,cat:'focus',make:mkCafe},
];
const NATURE_LAYERS=[
  {id:'crickets',icon:'🦗',name:'Night Crickets',desc:'Layered colonies — deeply rhythmic',vol:.5,cat:'nature',make:mkNightCrickets},
  {id:'birds',icon:'🐦',name:'Birds at Dawn',desc:'Morning birdsong & chirps',vol:.5,cat:'nature',make:mkBirds},
  {id:'bamboo',icon:'🎋',name:'Bamboo Forest Wind',desc:'High wind through bamboo + knocks',vol:.48,cat:'nature',make:mkBambooWind},
  {id:'jungle',icon:'🌴',name:'Jungle Ambience',desc:'Tropical birds & dense foliage',vol:.5,cat:'nature',make:mkJungle},
  {id:'river',icon:'🏞',name:'River / Stream',desc:'Flowing water over rocks',vol:.52,cat:'nature',make:mkRiver},
  {id:'mountain',icon:'🏔',name:'Mountain Wind',desc:'Sweeping high-altitude gusts',vol:.48,cat:'nature',make:mkMountainWind},
];
const ALL_LAYERS=[...FOCUS_LAYERS,...NATURE_LAYERS];
const COMBOS=[
  {label:'🤎 Elite Focus',ids:['brown','rain']},
  {label:'⛈ Storm Desk',ids:['thunder','fire']},
  {label:'🦗 Night Study',ids:['crickets','river']},
  {label:'🌊 Coastal',ids:['ocean','mountain']},
  {label:'🏕 Campfire',ids:['fire','forestwind','river']},
  {label:'☕ Café Rain',ids:['cafe','rain']},
  {label:'🌴 Jungle Dawn',ids:['birds','jungle','river']},
];
let layerState={};
ALL_LAYERS.forEach(l=>{layerState[l.id]={active:false,nodes:[],gainNode:null,vol:l.vol};});
let currentCat='focus',synced=false;

function startLayer(id){const ac=getAC(),st=layerState[id];if(st.active)return;const def=ALL_LAYERS.find(l=>l.id===id);const g=ac.createGain();g.gain.value=st.vol;g.connect(getMaster());const nodes=def.make(ac,g);st.active=true;st.nodes=nodes;st.gainNode=g;}
function stopLayer(id){const st=layerState[id];if(!st.active)return;if(st.nodes._ivs)st.nodes._ivs.forEach(iv=>clearInterval(iv));st.nodes.forEach(n=>{try{if(n.stop)n.stop();n.disconnect&&n.disconnect();}catch(e){}});try{st.gainNode.disconnect();}catch(e){}st.active=false;st.nodes=[];st.gainNode=null;}
function toggleLayer(id){layerState[id].active?stopLayer(id):startLayer(id);renderLayers();}
function setLayerVol(id,v){layerState[id].vol=parseFloat(v);if(layerState[id].gainNode)layerState[id].gainNode.gain.value=parseFloat(v);}
function applyCombo(ids){ALL_LAYERS.forEach(l=>{if(layerState[l.id].active&&!ids.includes(l.id))stopLayer(l.id);});ids.forEach(id=>startLayer(id));renderLayers();}
function toggleSync(){synced=!synced;document.getElementById('syncBtn').classList.toggle('on',synced);document.getElementById('syncBtn').textContent=synced?'✓ All On':'⇄ Sync All';if(synced){const cat=currentCat==='focus'?FOCUS_LAYERS:NATURE_LAYERS;cat.forEach(l=>{layerState[l.id].vol=.45;startLayer(l.id);});renderLayers();}}
function setCat(cat,el){currentCat=cat;synced=false;document.getElementById('syncBtn').classList.remove('on');document.getElementById('syncBtn').textContent='⇄ Sync All';document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active',t===el));renderLayers();renderCombos();}

function renderCombos(){
  const bar=document.getElementById('comboBar');bar.innerHTML='';
  COMBOS.filter(c=>c.ids.some(id=>ALL_LAYERS.find(l=>l.id===id&&l.cat===currentCat))).forEach(c=>{
    const b=document.createElement('button');b.className='combo-badge';b.textContent=c.label;b.onclick=()=>applyCombo(c.ids);bar.appendChild(b);});
}
function renderLayers(){
  const el=document.getElementById('layerList');el.innerHTML='';
  const list=currentCat==='focus'?FOCUS_LAYERS:NATURE_LAYERS;
  list.forEach(l=>{
    const st=layerState[l.id];
    const row=document.createElement('div');
    row.className='layer'+(st.active?' active':'');
    row.onclick=e=>{if(!e.target.matches('input'))toggleLayer(l.id);};
    row.innerHTML=`<div class="layer-icon">${l.icon}</div>
      <div class="layer-info"><div class="layer-name">${l.name}</div><div class="layer-desc">${l.desc}</div></div>
      <div class="vol-col">
        <input type="range" min="0" max="1" step="0.01" value="${st.vol}" onclick="event.stopPropagation()" oninput="setLayerVol('${l.id}',this.value);this.parentElement.querySelector('.vol-num').textContent=Math.round(this.value*100)+'%'">
        <span class="vol-num">${Math.round(st.vol*100)}%</span>
      </div>
      <div class="play-pill">${st.active?'⏸ On':'▶ Off'}</div>`;
    el.appendChild(row);
  });
}
renderLayers();renderCombos();

// Swipe down to close sheet
let touchStartY=0;
document.getElementById('sheet').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.getElementById('sheet').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-touchStartY>60)toggleSheet();},{passive:true});
</script>
